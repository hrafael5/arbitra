[Exchange Settings]
# Environment Config

# store your secrets and config variables in here
# note: conf.ini is a shell file so there can’t be spaces around =

############################################
##### Output UI Settings
############################################

maxRows=40

############################################
##### Storage settings
############################################

mongoHost=localhost
mongoPort=27017
mongoDb=BinanceTriArbitrage
useMongo=true

#### These can go in .keys if preferred, since this file may change on the repo.
#mongoUser=
#mongoPass=

##################################
##### Logging Settings 
##################################
## These are inactive if useMongo = false

# Calculated arbitrage opportunities for every tick
arbitrageTicksTable=ticks_arbitrage

# Raw ticks coming from the websocket stream. Usually a tick every 1s.
rawTicksTable=ticks_raw


############################################
##### Exchange Settings
############################################

#### Which exchange are we connecting to? Currenly only Binance is supported.
activeExchange=binance

#### Binance REST Settings
### Used for controlling & checking orders
restTimeout=15000
restRecvWindow=10000
restBeautify=false

#### these are paths we can step through
### The starting point
binanceStartingPoint=USDT

### The possible currencies we step via
# Updated list with more liquid coins to increase arbitrage opportunities
binanceColumns=BTC,USDC,ETH,SOL,SUI,FDUSD,XRP,BNB,PEPE,LAYER,LTC,TRUMP,DOGE,KAITO,TRX,ADA,VIRTUAL,SYRUP,PENGU,EOS,TAO,AVAX,WLD,TURBO,LINK,AAVE,BONK,ENA,WIF,PAXG,BCH,NEAR,FORM,HBAR,BERA,STPT,ASR,CRV,FET,LEVER,OM,S,APT,OP,MOVE,AIXBT,RENDER,LUMIA,INIT,UNI,ALPINE,STX,RAY,KMNO,FLOKI,FIL,SEI,BSW,PNUT,PORTAL,ARB,CYBER,SHIB,XLM,RUNE,HIGH,STO,ONDO,TON,PUNDIX,DOT,PARTI,PENDLE,WCT,NEIRO,LDO,REI,TIA,ALPHA,POL,CAKE,ATOM,FIDA,ETC,GALA,VET,MUBARAK,SIGN,HYPER,INJ,BAR,BMT,BABY,SOLV,GUN,ALGO,MKR,EIGEN,THETA,CFX,COOKIE,TST,WBTC,IOTA,NEO,FUN,SAGA,HIFI,ARKM,ORDI,IO,XUSD,STRK,CATI,ENS,ZRO,LISTA,XVS,DF,VOXEL,BEAMX,KAIA,SHELL,JASMY,ACT,LRC,ICP,SSV,G,ETHFI,VANA,AR,BOME,MAGIC,TRB,ICX,CETUS,KERNEL,ACX,IMX,RSR,DYDX,CVX,KDA,EDU,NOT,KAVA,FLM,USDT,IOTX

#####################################
#### Calculation Settings ##########
##################################

# Pair ranking
pairRankerTable=pair_ranking
# minimalProfit=1.015 ; This was the old profit threshold. The new system uses minQueuePercentageThreshold for NET profit after fees and estimated slippage.
pairTimer=900000

############################################
##### Arbitrage Strategy Settings (NEW) ####
############################################

# Capital in USDT for each arbitrage cycle
ARBITRAGE_CAPITAL_USDT=50

# Maximum acceptable slippage percentage per trade leg (e.g., 0.2 for 0.2%)
SLIPPAGE_MAX_PERCENT=0.2

# Number of order book levels to query for slippage estimation
ORDER_BOOK_DEPTH_LIMIT=100

# Binance trading fee percentage (e.g., 0.1 for 0.1%)
BINANCE_TRADE_FEE_PERCENT=0.1

# Cooldown time in milliseconds after an arbitrage attempt (successful or not)
# e.g., 120000 for 2 minutes
ARBITRAGE_COOLDOWN_MS=120000

# Gross profit percentage an opportunity must show to trigger a detailed simulation
# This is a quick filter before more intensive calculations.
# e.g., 1.0 for 1.0%
GROSS_PROFIT_THRESHOLD_PERCENT=0.00000001

# Minimum 24h quote volume in USDT (or equivalent) for each pair in the arbitrage path
# This is a quick filter to avoid very illiquid pairs.
MIN_QUOTE_VOLUME_THRESHOLD_USDT=500

# NET profit percentage expected AFTER simulation (which includes fees and estimated slippage)
# for the bot to proceed with the REAL trade execution.
# Using your previous minimalProfit value here. Adjust as needed.
minQueuePercentageThreshold=-0.5

# (Existing variable, ensure it's set as needed for general bot operation, though not directly tied to the new slippage logic)
# minHitsThreshold=1 

# (Existing variable, ensure it's set as needed)
PAPERONLY=false

# (Existing variable, ensure it's set as needed)
# logHistory=false
